<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Brother</title>
  <style>
    html, body {
      min-height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), #1E90FF);
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      padding: 50px 20px;
      overflow-y: auto; /* permite rolagem */
    }
    h1 {
      font-size: 3em;
      margin-bottom: 40px;
    }
    .above-audio {
      font-size: 2em;
      margin-bottom: 10px;
      font-weight: bold;
      text-shadow: 1px 1px 3px #000;
    }
    audio {
      margin-top: 10px;
      margin-bottom: 20px;
      width: 300px;
    }
    p {
      font-size: 2em;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 3px #000;
    }
  </style>
</head>
<body>
  <h1>Oi, Brother!</h1>

  <!-- Texto em cima da música -->
  <div class="above-audio">Obrigado por tudo meu mano</div>

  <!-- Música com link público online -->
  <audio controls autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/08/03/audio_39c1f6b4d1.mp3?filename=happy-birthday-13539.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>

  <!-- Texto embaixo da música -->
  <p>Te amo meu brother</p>
</body>
</html>
